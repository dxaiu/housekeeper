<!-- 生活管家图标设计 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1677ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#722ED1;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="256" cy="256" r="256" fill="url(#grad1)"/>
  
  <!-- 房子图标 -->
  <path d="M400 256L256 128L112 256V400H400V256Z" fill="white"/>
  <path d="M256 128V256" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <path d="M256 256V400" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <path d="M112 320H400" stroke="white" stroke-width="16" stroke-linecap="round"/>
  
  <!-- 账单图标 -->
  <rect x="176" y="280" width="160" height="80" rx="8" fill="#f0f0f0"/>
  <line x1="192" y1="304" x2="320" y2="304" stroke="#1677ff" stroke-width="4"/>
  <line x1="192" y1="320" x2="304" y2="320" stroke="#1677ff" stroke-width="4"/>
  <line x1="192" y1="336" x2="288" y2="336" stroke="#1677ff" stroke-width="4"/>
</svg>